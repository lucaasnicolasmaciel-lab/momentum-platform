<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Momentum Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="../data.js"></script>
<style>
:root {
  --green: #1A4A2E;
  --green-mid: #2D6B45;
  --green-light: #EAF3EC;
  --green-dark: #112E1C;
  --cream: #F5F0E8;
  --cream-dark: #EDE8DF;
  --ink: #1C1C1A;
  --muted: #6B6B62;
  --border: #C8C2B4;
  --white: #FFFFFF;
  --success: #1D9E75;
  --success-light: #EAF7F2;
  --warning: #F5C842;
  --warning-light: #FFF8E6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

/* HEADER */
.header { background: var(--green-dark); padding: 0 32px; display: flex; align-items: center; height: 56px; border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 50; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-leaf { width: 20px; height: 20px; }
.logo-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 500; color: rgba(245,240,232,0.7); }
.header-title { font-size: 12px; color: rgba(245,240,232,0.35); margin-left: 20px; padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.1); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.header-badge { background: rgba(245,240,232,0.08); border: 1px solid rgba(245,240,232,0.12); border-radius: 6px; padding: 4px 12px; font-size: 11px; color: rgba(245,240,232,0.5); }

/* CONTENT */
.page { max-width: 1100px; margin: 0 auto; padding: 32px; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
.stat-card { background: var(--white); border: 0.5px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 500; color: var(--green); line-height: 1; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* SECTION */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--ink); }
.btn-add { background: var(--green); color: var(--cream); border: none; padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }

/* PENDING */
.pending-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.pending-card { background: var(--warning-light); border: 1px solid var(--warning); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
.pending-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); flex-shrink: 0; }
.pending-meta { flex: 1; }
.pending-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.pending-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
.pending-actions { display: flex; gap: 8px; }
.btn-approve { background: var(--success); color: white; border: none; padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-view { background: transparent; color: var(--ink); border: 1px solid var(--border); padding: 6px 14px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; }

/* CLIENTS TABLE */
.clients-grid { display: flex; flex-direction: column; gap: 10px; }
.client-card { background: var(--white); border: 0.5px solid var(--border); border-radius: 14px; padding: 18px 20px; display: flex; align-items: center; gap: 20px; transition: border-color 0.15s; }
.client-card:hover { border-color: var(--green-mid); }
.client-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--cream); font-weight: 500; flex-shrink: 0; }
.client-info { flex: 1; }
.client-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.client-role { font-size: 12px; color: var(--muted); margin-top: 2px; }
.client-stage { flex-shrink: 0; text-align: center; }
.stage-badge { display: inline-block; background: var(--green-light); color: var(--green); border: 1px solid #9FE1CB; border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 500; }
.stage-name { font-size: 11px; color: var(--muted); margin-top: 4px; }
.client-day { flex-shrink: 0; text-align: center; min-width: 70px; }
.day-num-sm { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; color: var(--ink); line-height: 1; }
.day-label-sm { font-size: 10px; color: var(--muted); }
.client-progress { flex-shrink: 0; min-width: 140px; }
.prog-track { height: 4px; background: var(--cream-dark); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.prog-fill { height: 4px; background: var(--green); border-radius: 2px; }
.prog-text { font-size: 11px; color: var(--muted); }
.client-actions { flex-shrink: 0; display: flex; gap: 8px; }
.btn-portal { background: transparent; color: var(--green); border: 1px solid var(--border); padding: 6px 14px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-block; }
.btn-portal:hover { border-color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg class="logo-leaf" viewBox="0 0 20 20" fill="none">
      <path d="M10 2C10 2 4 6 4 11C4 14.3 6.7 17 10 17C13.3 17 16 14.3 16 11C16 6 10 2 10 2Z" fill="rgba(245,240,232,0.15)" stroke="rgba(245,240,232,0.4)" stroke-width="1"/>
      <path d="M10 17V10" stroke="rgba(245,240,232,0.4)" stroke-width="1" stroke-linecap="round"/>
    </svg>
    <span class="logo-name">Momentum Impact</span>
  </div>
  <span class="header-title">Vista interna — Lucas Maciel</span>
  <div class="header-right">
    <div class="header-badge">5 clientes activos</div>
  </div>
</div>

<div class="page">

  <!-- STATS -->
  <div class="stats" id="stats"></div>

  <!-- PENDING REVIEWS -->
  <div class="section-header">
    <div class="section-title">Pendientes de revisión</div>
  </div>
  <div class="pending-list" id="pending-list"></div>

  <!-- ALL CLIENTS -->
  <div class="section-header">
    <div class="section-title">Clientes activos</div>
    <button class="btn-add">+ Nuevo cliente</button>
  </div>
  <div class="clients-grid" id="clients-grid"></div>

</div>

<script>
const clients = Object.values(PLATFORM_DATA.clients);

// STATS
const totalClients = clients.length;
let pendingCount = 0;
let onTrackCount = 0;

clients.forEach(c => {
  const sp = c.stages[c.currentStage];
  if (sp.completed.length > sp.approved.length) pendingCount++;
  const day = getDayNumber(c.startDate);
  if (day <= 15) onTrackCount++;
});

const statsEl = document.getElementById('stats');
[
  { num: totalClients, label: 'Clientes activos' },
  { num: pendingCount, label: 'Pendientes de revisión' },
  { num: onTrackCount, label: 'En tiempo' },
  { num: PLATFORM_DATA.stages[Object.keys(PLATFORM_DATA.stages).length]?.steps?.length || 4, label: 'Etapas en total' }
].forEach(s => {
  statsEl.innerHTML += `<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`;
});

// PENDING
const pendingEl = document.getElementById('pending-list');
let hasPending = false;
clients.forEach(c => {
  const sp = c.stages[c.currentStage];
  const pendingSteps = sp.completed.filter(id => !sp.approved.includes(id));
  if (pendingSteps.length > 0) {
    hasPending = true;
    const stageData = PLATFORM_DATA.stages[c.currentStage];
    pendingSteps.forEach(stepId => {
      const step = stageData.steps.find(s => s.id === stepId);
      pendingEl.innerHTML += `
        <div class="pending-card">
          <div class="pending-dot"></div>
          <div class="pending-meta">
            <div class="pending-name">${c.name}</div>
            <div class="pending-detail">Etapa ${c.currentStage} — ${step?.title || 'Paso ' + stepId} · Esperando tu revisión</div>
          </div>
          <div class="pending-actions">
            <button class="btn-view">Ver entregable</button>
            <button class="btn-approve">Aprobar</button>
          </div>
        </div>`;
    });
  }
});
if (!hasPending) {
  pendingEl.innerHTML = `<div style="padding:16px 20px;background:var(--success-light);border:1px solid #9FE1CB;border-radius:12px;font-size:13px;color:#085041">Todo al día. No hay entregables pendientes de revisión.</div>`;
}

// CLIENTS GRID
const gridEl = document.getElementById('clients-grid');
clients.forEach(c => {
  const day = getDayNumber(c.startDate);
  const sp = c.stages[c.currentStage];
  const stageData = PLATFORM_DATA.stages[c.currentStage];
  const progPct = Math.round(sp.completed.length / stageData.steps.length * 100);
  const initial = c.name.charAt(0);
  const stageName = stageData.name;

  gridEl.innerHTML += `
    <div class="client-card">
      <div class="client-avatar">${initial}</div>
      <div class="client-info">
        <div class="client-name">${c.name}</div>
        <div class="client-role">${c.specialty}</div>
      </div>
      <div class="client-stage">
        <div class="stage-badge">Etapa ${c.currentStage}</div>
        <div class="stage-name">${stageName}</div>
      </div>
      <div class="client-day">
        <div class="day-num-sm">Día ${day}</div>
        <div class="day-label-sm">de 15</div>
      </div>
      <div class="client-progress">
        <div class="prog-track"><div class="prog-fill" style="width:${progPct}%"></div></div>
        <div class="prog-text">${sp.completed.length} de ${stageData.steps.length} pasos · ${progPct}%</div>
      </div>
      <div class="client-actions">
        <a class="btn-portal" href="../client/index.html?cliente=${c.id}" target="_blank">Ver portal</a>
      </div>
    </div>`;
});
</script>
</body>
</html>
